---
# Operator: rhbk-operator (Red Hat build of Keycloak Operator)
# Full Name: rhbk-operator.${NAMESPACE}
# CRD Patterns: k8s.keycloak.org
# Namespace-scoped: This operator instance is owned by and scoped to the quickstart namespace
---
apiVersion: v1
kind: Namespace
metadata:
  name: ${NAMESPACE}
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  generateName: ${NAMESPACE}-
  namespace: ${NAMESPACE}
spec:
  targetNamespaces:
    - ${NAMESPACE}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhbk-operator
  namespace: ${NAMESPACE}
spec:
  channel: stable-v26
  name: rhbk-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
  startingCSV: ${STARTING_CSV}
