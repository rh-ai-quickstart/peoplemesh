---
# Job that Navigator creates to run the installer
apiVersion: batch/v1
kind: Job
metadata:
  name: quickstart-install-peoplemesh
  namespace: peoplemesh-quickstart
  labels:
    app: peoplemesh-quickstart
    component: installer
    managed-by: project-navigator
spec:
  # Don't retry on failure - let Navigator handle retries
  backoffLimit: 0

  # Clean up completed jobs after 1 hour (Navigator has already captured logs)
  ttlSecondsAfterFinished: 3600

  template:
    metadata:
      labels:
        app: peoplemesh-quickstart
        component: installer
    spec:
      # Uses default ServiceAccount in namespace, which has permissions
      # granted by Navigator (or uses Navigator's SA directly)
      # No per-quickstart ServiceAccount needed
      restartPolicy: Never

      containers:
        - name: installer
          image: quay.io/rh-ai-quickstart/peoplemesh-installer:1.0.0
          imagePullPolicy: Always

          env:
            # Required: Action to perform
            - name: ACTION
              value: "INSTALL"

            # Required: Target namespace
            - name: TARGET_NAMESPACE
              value: "peoplemesh-quickstart"

            # Required: Install mode
            - name: INSTALL_MODE
              value: "demo"  # or "production"

            # Optional: GPU configuration (from user input via Navigator)
            - name: PARAM_OLLAMA_GPU_ENABLED
              value: "false"

            - name: PARAM_DOCLING_GPU_ENABLED
              value: "false"

            # Optional: LLM configuration
            - name: PARAM_PEOPLEMESH_LLM_MODE
              value: "local"  # or "external"
          # Resource limits for the installer job itself (not the quickstart)
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

