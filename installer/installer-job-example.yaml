# Example Kubernetes Job that Project Navigator would submit
# to deploy the Peoplemesh quickstart using the installer container
#
# SIMPLIFIED APPROACH:
# Navigator runs with its own ServiceAccount that has permissions to deploy quickstarts.
# Installer Jobs inherit these permissions - no per-quickstart RBAC needed.
#
# This is similar to:
# - How you deploy with `oc` - you use your login context
# - How Operators work - they create resources using their own ServiceAccount
#
# Navigator orchestration flow:
# 1. Reads manifest's deployment.installer.requiredPermissions section
# 2. Validates it has the required permissions
# 3. Creates Job (uses Navigator's ServiceAccount or default SA)
# 4. Streams job logs for real-time progress updates
# 5. Parses JSON status and reports to user via chat interface
#
# NOTE: The ServiceAccount/RBAC resources below are for reference only.
# They would be created ONCE when Navigator is installed, not per quickstart.

