# Example Kubernetes Job that Project Navigator would submit
# to deploy the Peoplemesh quickstart using the installer container
#
# This demonstrates how Navigator orchestrates quickstart deployment:
# 1. Creates a ServiceAccount with required RBAC permissions
# 2. Creates a Job that runs the installer container
# 3. Passes all configuration as environment variables
# 4. Monitors job logs for JSON status updates
# 5. Reports progress to user via chat interface

---
# ServiceAccount for the installer job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quickstart-installer
  namespace: peoplemesh-quickstart

---
# Role with permissions needed to deploy the quickstart
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quickstart-installer
  namespace: peoplemesh-quickstart
rules:
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Workloads
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Routes (OpenShift)
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Keycloak CRs
  - apiGroups: ["k8s.keycloak.org"]
    resources: ["keycloaks", "keycloakrealmimports"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Needed for health checks and verification
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get", "list"]

  # Needed to check operator CSV
  - apiGroups: ["operators.coreos.com"]
    resources: ["clusterserviceversions"]
    verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quickstart-installer
  namespace: peoplemesh-quickstart
subjects:
  - kind: ServiceAccount
    name: quickstart-installer
    namespace: peoplemesh-quickstart
roleRef:
  kind: Role
  name: quickstart-installer
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for cluster-wide checks (OpenShift version, nodes, storage classes)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: quickstart-installer-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]

  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions"]
    verbs: ["get", "list"]

  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: quickstart-installer-cluster-reader-peoplemesh
subjects:
  - kind: ServiceAccount
    name: quickstart-installer
    namespace: peoplemesh-quickstart
roleRef:
  kind: ClusterRole
  name: quickstart-installer-cluster-reader
  apiGroup: rbac.authorization.k8s.io

---
# Job that runs the installer
apiVersion: batch/v1
kind: Job
metadata:
  name: quickstart-install-peoplemesh
  namespace: peoplemesh-quickstart
  labels:
    app: peoplemesh-quickstart
    component: installer
    managed-by: project-navigator
spec:
  # Don't retry on failure - let Navigator handle retries
  backoffLimit: 0

  # Clean up completed jobs after 1 hour (Navigator has already captured logs)
  ttlSecondsAfterFinished: 3600

  template:
    metadata:
      labels:
        app: peoplemesh-quickstart
        component: installer
    spec:
      serviceAccountName: quickstart-installer
      restartPolicy: Never

      containers:
        - name: installer
          image: ghcr.io/rh-ai-quickstart/peoplemesh-installer:1.0.0
          imagePullPolicy: Always

          env:
            # Required: Action to perform
            - name: ACTION
              value: "install"

            # Required: Target namespace
            - name: TARGET_NAMESPACE
              value: "peoplemesh-quickstart"

            # Required: Install mode
            - name: INSTALL_MODE
              value: "demo"  # or "production"

            # Optional: GPU configuration (from user input via Navigator)
            - name: PARAM_OLLAMA_GPU_ENABLED
              value: "false"

            - name: PARAM_DOCLING_GPU_ENABLED
              value: "false"

            # Optional: LLM configuration
            - name: PARAM_PEOPLEMESH_LLM_MODE
              value: "local"  # or "external"

            # Optional: External LLM (only if mode=external)
            # - name: PARAM_PEOPLEMESH_LLM_EXTERNAL_APIKEY
            #   value: "sk-..."
            # - name: PARAM_PEOPLEMESH_LLM_EXTERNAL_BASEURL
            #   value: "https://api.openai.com/v1"
            # - name: PARAM_PEOPLEMESH_LLM_EXTERNAL_CHATMODEL
            #   value: "gpt-4o-mini"

            # Optional: Organization branding
            # - name: PARAM_PEOPLEMESH_ORGANIZATION_NAME
            #   value: "Acme Corporation"
            # - name: PARAM_PEOPLEMESH_ORGANIZATION_CONTACTEMAIL
            #   value: "admin@acme.com"

            # Optional: OAuth providers
            # - name: PARAM_PEOPLEMESH_OIDC_GOOGLE_CLIENTID
            #   value: "..."
            # - name: PARAM_PEOPLEMESH_OIDC_GOOGLE_CLIENTSECRET
            #   value: "..."
            # - name: PARAM_PEOPLEMESH_OIDC_MICROSOFT_CLIENTID
            #   value: "..."
            # - name: PARAM_PEOPLEMESH_OIDC_MICROSOFT_CLIENTSECRET
            #   value: "..."

            # Note: Secrets (passwords, keys) are auto-generated by installer if not provided
            # Navigator typically doesn't pass these - lets installer generate them

          # Resource limits for the installer job itself (not the quickstart)
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

