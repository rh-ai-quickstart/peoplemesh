---
# How Navigator Uses This Job
# ==============================
#
# 1. User Request (via chat):
#    User: "Deploy peoplemesh with GPU acceleration"
#
# 2. Navigator Discovery:
#    - Fetches manifest from registry
#    - Identifies this is the peoplemesh quickstart
#    - Reads prerequisites, parameters, deployment config
#
# 3. Navigator Configuration:
#    - Asks user for required parameters (or uses defaults)
#    - Asks: "Enable GPU acceleration? (requires NVIDIA GPU Operator)"
#    - User: "Yes"
#    - Sets PARAM_OLLAMA_GPU_ENABLED=true, PARAM_DOCLING_GPU_ENABLED=true
#
# 4. Navigator Deployment:
#    - Creates namespace: peoplemesh-quickstart
#    - Creates ServiceAccount + RBAC (from manifest.deployment.installer.serviceAccount)
#    - Creates Job with installer image
#    - Passes all parameters as environment variables
#
# 5. Navigator Monitoring:
#    - Streams job logs: oc logs -f job/quickstart-install-peoplemesh -n peoplemesh-quickstart
#    - Parses JSON status updates:
#      {"status":"running","phase":"validating","message":"Checking prerequisites..."}
#      -> Navigator: "Validating prerequisites..."
#
#      {"status":"running","phase":"deploying","message":"Installing Helm chart..."}
#      -> Navigator: "Installing components (this may take 10-15 minutes)..."
#
#      {"status":"running","phase":"verifying","message":"Waiting for pods... (4/6 ready)"}
#      -> Navigator: "Waiting for pods to be ready (4 of 6 ready)..."
#
#      {"status":"success","endpoints":[{"name":"main","url":"https://peoplemesh.apps.example.com"}]}
#      -> Navigator: "Deployment complete! Access at https://peoplemesh.apps.example.com
#                     Login with: testuser@example.com / [password from config]"
#
# 6. Error Handling:
#    If job exits with code 2 (prerequisites failed):
#      {"status":"prerequisites_failed","missing":["NVIDIA GPU Operator"]}
#      -> Navigator: "Cannot deploy: NVIDIA GPU Operator is required but not installed.
#                     Would you like to deploy without GPU acceleration instead?"
#
#    If job exits with code 1 (general failure):
#      {"status":"error","message":"Helm installation failed"}
#      -> Navigator: "Deployment failed: Helm installation failed. Check logs for details."
