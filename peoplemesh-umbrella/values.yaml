# Peoplemesh Umbrella Chart - Complete Deployment Configuration
# This umbrella chart orchestrates all components needed for peoplemesh

# Global configuration that can be referenced by subcharts
global:
  namespace: peoplemesh

# PostgreSQL with pgvector extension
pgvector:
  enabled: true
  applicationName: pgvector
  postgres:
    userId: peoplemesh
    password: changeme-secure-password  # CHANGE THIS IN PRODUCTION
    databaseName: peoplemesh
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    persistence:
      enabled: true
      size: 20Gi

# Docling document processing service
docling:
  enabled: true
  applicationName: docling
  docling:
    enableUI: true
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

# vLLM inference server (local LLM deployment)
# Set enabled: false to use external LLM instead
vllm:
  enabled: true  # Set to false for external LLM
  model:
    name: peoplemesh-llm
    displayName: "Peoplemesh LLM"
    storage:
      type: uri
      uri: "hf://Qwen/Qwen2.5-7B-Instruct-AWQ"
    runtime:
      name: peoplemesh-vllm-runtime
    resources:
      limits:
        nvidia.com/gpu: 1
        cpu: "2"
        memory: "12Gi"
      requests:
        nvidia.com/gpu: 1
        cpu: "1"
        memory: "8Gi"
  security:
    enableAuth: false

# Peoplemesh application
peoplemesh:
  applicationName: peoplemesh
  peoplemesh:
    image:
      repository: frapax/peoplemesh
      tag: main
    route:
      enabled: true
      host: ""  # Auto-generated by OpenShift if empty
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  # Database configuration (references pgvector)
  database:
    host: pgvector-service
    port: 5432
    name: peoplemesh
    user: peoplemesh
    existingSecret: pgvector-database
    passwordKey: DATABASE_PASSWORD

  # LLM configuration
  llm:
    # Mode: "local" uses vllm chart, "external" uses provided endpoint
    mode: local  # Change to "external" to use external LLM

    # Local LLM configuration (when mode=local)
    local:
      serviceName: peoplemesh-llm-predictor
      modelName: peoplemesh-llm

    # External LLM configuration (when mode=external)
    # Uncomment and configure if using external LLM
    # external:
    #   baseUrl: "https://api.openai.com/v1"
    #   apiKey: "sk-..."
    #   chatModel: "gpt-4o-mini"
    #   embeddingModel: "text-embedding-3-small"
    #   embeddingDimension: 384

  # Docling configuration
  docling:
    serviceName: docling-service
    port: 5001
    enabled: true

  # CV Import configuration
  cvImport:
    provider: docling  # Uses Docling for CV parsing
    maxFileSize: 5242880

  # Organization configuration
  organization:
    name: "My Organization"
    contactEmail: "contact@example.com"
    dpoEmail: "dpo@example.com"
    dataLocation: "US"
    governingLaw: "US Law"

  # Feature flags
  features:
    clusteringEnabled: true
    frontendEnabled: true

  # Security configuration
  # NOTE: Secrets are auto-generated if not provided
  security:
    sessionSecret: ""  # Auto-generated
    oauthStateSecret: ""  # Auto-generated
    maintenanceApiKey: ""  # Auto-generated
    corsOrigins: "*"  # Change to specific origins in production

    # OIDC providers - AT LEAST ONE IS REQUIRED
    # Uncomment and configure at least one provider:
    oidc:
      google:
        clientId: ""  # REQUIRED if not using Microsoft
        clientSecret: ""
      microsoft:
        clientId: ""  # REQUIRED if not using Google
        clientSecret: ""
