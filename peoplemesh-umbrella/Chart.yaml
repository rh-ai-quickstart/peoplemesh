apiVersion: v2
name: peoplemesh-umbrella
description: Umbrella chart for complete peoplemesh deployment with all dependencies
type: application
version: 0.1.0
appVersion: "latest"
maintainers:
  - name: Peter Samouelian
    email: psamouel@redhat.com
sources:
  - https://github.com/francescopace/peoplemesh

# Dependencies - Helm will install these in order
dependencies:
  - name: pgvector
    version: 0.1.0
    repository: "file://../charts/pgvector"
    condition: pgvector.enabled

  - name: docling
    version: 0.1.0
    repository: "file://../charts/docling"
    condition: docling.enabled

  - name: vllm
    version: 0.1.0
    repository: "file://../charts/vllm"
    condition: vllm.enabled

  - name: peoplemesh
    version: 0.1.0
    repository: "file://../charts/peoplemesh"
