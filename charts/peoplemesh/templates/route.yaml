{{- if .Values.peoplemesh.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.applicationName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
  annotations:
    # Increase timeout to handle slow LLM requests (CV import on CPU can take 3-4 minutes)
    haproxy.router.openshift.io/timeout: 300s
spec:
  {{- if .Values.peoplemesh.route.host }}
  host: {{ .Values.peoplemesh.route.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ .Values.applicationName }}-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
