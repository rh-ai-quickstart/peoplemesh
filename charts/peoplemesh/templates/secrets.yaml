apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.applicationName }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  # Security secrets - REQUIRED, no defaults
  SESSION_SECRET: {{ .Values.security.sessionSecret | required "peoplemesh.security.sessionSecret is required" | quote }}
  OAUTH_STATE_SECRET: {{ .Values.security.oauthStateSecret | required "peoplemesh.security.oauthStateSecret is required" | quote }}
  MAINTENANCE_API_KEY: {{ .Values.security.maintenanceApiKey | required "peoplemesh.security.maintenanceApiKey is required" | quote }}

  # LLM configuration
  {{- if eq .Values.llm.mode "ollama" }}
  # Ollama mode - no API key needed (internal service)
  OPENAI_API_KEY: "ollama-no-key-needed"
  {{- else if eq .Values.llm.mode "vllm" }}
  # vLLM mode - retrieve service account token from vLLM chart
  {{- $vllmTokenSecret := lookup "v1" "Secret" .Release.Namespace (printf "default-name-%s-sa" .Values.llm.vllm.modelName) }}
  {{- if $vllmTokenSecret }}
  OPENAI_API_KEY: {{ index $vllmTokenSecret.data "token" | b64dec | quote }}
  {{- else }}
  # Fallback if vLLM secret doesn't exist yet (first install)
  OPENAI_API_KEY: "vllm-token-pending"
  {{- end }}
  {{- else if eq .Values.llm.mode "external" }}
  # External LLM mode - use provided API key
  OPENAI_API_KEY: {{ .Values.llm.external.apiKey | quote }}
  OPENAI_BASE_URL: {{ .Values.llm.external.baseUrl | quote }}
  LLM_MODEL: {{ .Values.llm.external.chatModel | quote }}
  EMBEDDING_MODEL: {{ .Values.llm.external.embeddingModel | quote }}
  EMBEDDING_DIMENSION: {{ .Values.llm.external.embeddingDimension | quote }}
  {{- end }}

  # OIDC providers (at least one is REQUIRED)
  {{- if .Values.security.oidc.keycloak.clientId }}
  {{- $keycloakSecret := lookup "v1" "Secret" .Release.Namespace "keycloak-client-secret" }}
  {{- if $keycloakSecret }}
  OIDC_KEYCLOAK_CLIENT_ID: {{ .Values.security.oidc.keycloak.clientId | quote }}
  OIDC_KEYCLOAK_CLIENT_SECRET: {{ index $keycloakSecret.data "clientSecret" | b64dec | quote }}
  OIDC_KEYCLOAK_ISSUER_URL: {{ index $keycloakSecret.data "issuerUrl" | b64dec | quote }}
  {{- else }}
  # Fallback if umbrella secret doesn't exist (standalone deployment)
  OIDC_KEYCLOAK_CLIENT_ID: {{ .Values.security.oidc.keycloak.clientId | quote }}
  OIDC_KEYCLOAK_CLIENT_SECRET: {{ .Values.security.oidc.keycloak.clientSecret | default "none" | quote }}
  OIDC_KEYCLOAK_ISSUER_URL: {{ .Values.security.oidc.keycloak.issuerUrl | default "none" | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.security.oidc.google.clientId }}
  OIDC_GOOGLE_CLIENT_ID: {{ .Values.security.oidc.google.clientId | quote }}
  OIDC_GOOGLE_CLIENT_SECRET: {{ .Values.security.oidc.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.security.oidc.microsoft.clientId }}
  OIDC_MICROSOFT_CLIENT_ID: {{ .Values.security.oidc.microsoft.clientId | quote }}
  OIDC_MICROSOFT_CLIENT_SECRET: {{ .Values.security.oidc.microsoft.clientSecret | quote }}
  {{- end }}
