apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.applicationName }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
data:
  # Database configuration
  DB_URL: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
  DB_USER: {{ .Values.database.user | quote }}
  DB_POOL_MIN_SIZE: "4"
  DB_POOL_MAX_SIZE: "24"
  DB_POOL_ACQUIRE_TIMEOUT: "30s"
  HIBERNATE_BATCH_SIZE: "32"
  HIBERNATE_FETCH_SIZE: "100"

  # Flyway configuration - enable seed data loading for demo/test environments
  # Options: "classpath:db/migration,classpath:db/granite" or "classpath:db/migration,classpath:db/openai"
  # For production: omit this or set to "classpath:db/migration" only
  QUARKUS_FLYWAY_LOCATIONS: "classpath:db/migration,classpath:db/granite"

  # LLM configuration
  {{- if eq .Values.llm.mode "ollama" }}
  # Ollama mode - local CPU-based LLM
  OPENAI_BASE_URL: "http://{{ .Values.llm.ollama.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.llm.ollama.port }}/v1"
  LLM_MODEL: {{ .Values.llm.ollama.chatModel | quote }}
  EMBEDDING_MODEL: {{ .Values.llm.ollama.embeddingModel | quote }}
  EMBEDDING_DIMENSION: {{ .Values.llm.ollama.embeddingDimension | quote }}
  # Increase timeout for CPU-based inference - first model load can take 30-60s
  # Extended to 120s to handle edge cases with concurrent requests or complex queries
  QUARKUS_LANGCHAIN4J_OPENAI_TIMEOUT: "240s"
  {{- else if eq .Values.llm.mode "vllm" }}
  # vLLM mode - GPU-based LLM (KServe)
  OPENAI_BASE_URL: "http://{{ .Values.llm.vllm.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local/v1"
  LLM_MODEL: {{ .Values.llm.vllm.modelName | quote }}
  EMBEDDING_MODEL: {{ .Values.llm.vllm.modelName | quote }}
  EMBEDDING_DIMENSION: "768"
  {{- else if eq .Values.llm.mode "external" }}
  # External LLM mode - configuration in secrets
  {{- end }}

  # Docling configuration
  {{- if .Values.docling.enabled }}
  QUARKUS_DOCLING_BASE_URL: "http://{{ .Values.docling.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.docling.port }}"
  {{- end }}

  # CV Import configuration
  CV_IMPORT_PROVIDER: {{ .Values.cvImport.provider | quote }}

  # CORS configuration
  CORS_ORIGINS: {{ .Values.security.corsOrigins | quote }}

  # Proxy configuration - trust X-Forwarded headers from OpenShift route
  QUARKUS_HTTP_PROXY_PROXY_ADDRESS_FORWARDING: "true"
  QUARKUS_HTTP_PROXY_ALLOW_X_FORWARDED: "true"
  QUARKUS_HTTP_PROXY_ENABLE_FORWARDED_HOST: "true"
  QUARKUS_HTTP_PROXY_ENABLE_FORWARDED_PREFIX: "true"

  # HTTP timeouts - increase for long-running operations like CV import
  QUARKUS_HTTP_IDLE_TIMEOUT: "5m"
  QUARKUS_HTTP_READ_TIMEOUT: "5m"

  # Organization configuration
  ORGANIZATION_NAME: {{ .Values.organization.name | quote }}
  ORGANIZATION_CONTACT_EMAIL: {{ .Values.organization.contactEmail | quote }}
  ORGANIZATION_DPO_EMAIL: {{ .Values.organization.dpoEmail | quote }}
  ORGANIZATION_DATA_LOCATION: {{ .Values.organization.dataLocation | quote }}
  ORGANIZATION_GOVERNING_LAW: {{ .Values.organization.governingLaw | quote }}

  # Feature flags
  CLUSTERING_ENABLED: {{ .Values.features.clusteringEnabled | quote }}
  PEOPLEMESH_FRONTEND_ENABLED: {{ .Values.features.frontendEnabled | quote }}
  {{- if .Values.features.maintenanceAllowedCidrs }}
  MAINTENANCE_ALLOWED_CIDRS: {{ .Values.features.maintenanceAllowedCidrs | quote }}
  {{- end }}
