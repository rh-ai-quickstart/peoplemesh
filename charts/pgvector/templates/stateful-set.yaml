apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.applicationName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
spec:
  serviceName: {{ .Values.applicationName }}-service
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.applicationName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.applicationName }}
    spec:
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "g5-gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: {{ .Values.applicationName }}
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
              protocol: TCP
              name: postgresql
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.applicationName }}-database
                  key: DATABASE_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.applicationName }}-database
                  key: DATABASE_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.applicationName }}-database
                  key: DATABASE_NAME
            - name: POSTGRESQL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.applicationName }}-database
                  key: DATABASE_PASSWORD
            - name: PGDATA
              value: /var/lib/pgsql/data/pgdata
          volumeMounts:
            - name: {{ .Values.applicationName }}-data
              mountPath: /var/lib/pgsql/data
            - name: init-script
              mountPath: /opt/app-root/src/postgresql-start/
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: init-script
          configMap:
            name: {{ .Values.applicationName }}-init-script
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: {{ .Values.applicationName }}-data
        labels:
          app.kubernetes.io/name: {{ .Values.applicationName }}
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
