apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.applicationName }}-database
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  DATABASE_USER: {{ .Values.postgres.userId | quote }}
  DATABASE_PASSWORD: {{ .Values.postgres.password | quote }}
  DATABASE_NAME: {{ .Values.postgres.databaseName | quote }}
  DATABASE_HOST: {{ .Values.applicationName }}-service
  DATABASE_PORT: "5432"
