apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.applicationName }}-database
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
  annotations:
    # Create secret before other resources to ensure consistent password
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  DATABASE_USER: {{ .Values.postgres.userId | quote }}
  DATABASE_PASSWORD: {{ include "pgvector.postgresPassword" . | quote }}
  DATABASE_NAME: {{ .Values.postgres.databaseName | quote }}
  DATABASE_HOST: {{ .Values.applicationName }}-service
  DATABASE_PORT: "5432"
