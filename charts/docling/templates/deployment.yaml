apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.applicationName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.docling.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.applicationName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.applicationName }}
    spec:
      {{- with .Values.docling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.applicationName }}
          {{- if .Values.gpu.enabled }}
          image: quay.io/docling-project/docling-serve:latest
          {{- else }}
          image: {{ .Values.docling.image.repository }}:{{ .Values.docling.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.docling.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.docling.service.targetPort }}
              protocol: TCP
              name: http
          env:
            - name: DOCLING_SERVE_ENABLE_UI
              value: {{ .Values.docling.enableUI | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.docling.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.docling.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.docling.resources.requests.cpu }}
              memory: {{ .Values.docling.resources.requests.memory }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: "1"
              {{- end }}
            limits:
              cpu: {{ .Values.docling.resources.limits.cpu }}
              memory: {{ .Values.docling.resources.limits.memory }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: "1"
              {{- end }}
