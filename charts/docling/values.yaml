applicationName: docling

# GPU acceleration - set to true to require GPU for faster document processing
# Default: false (CPU-only) for maximum compatibility
gpu:
  enabled: false

docling:
  # Docling image configuration
  # Note: Image changes automatically when gpu.enabled=true
  image:
    repository: quay.io/docling-project/docling-serve-cpu
    tag: latest
    pullPolicy: IfNotPresent

  # Service configuration
  service:
    port: 5001
    targetPort: 5001

  # Enable the Docling UI at /ui endpoint
  enableUI: true

  # Resource limits - GPU resources are conditionally added based on gpu.enabled flag
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  # Replica configuration
  replicas: 1

  # Tolerations for GPU nodes - pre-configured for common GPU taints
  tolerations:
    - key: g5-gpu
      operator: Exists
      effect: NoSchedule
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
