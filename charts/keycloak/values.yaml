applicationName: keycloak

# Target namespace - will be overridden by umbrella chart
# When used standalone: samouelian-keycloak
# When used in umbrella: same as release namespace
namespace: ""  # Empty means use release namespace

# PostgreSQL database for Keycloak (separate from peoplemesh database)
postgres:
  # Database configuration - password REQUIRED
  user: keycloak
  password: ""  # REQUIRED - no default value
  database: keycloak

  # PostgreSQL image (same as pgvector - proven to work)
  image:
    repository: quay.io/rh-aiservices-bu/postgresql-15-pgvector-c9s
    tag: latest
    pullPolicy: IfNotPresent

  # Service configuration
  service:
    name: keycloak-postgres-db
    port: 5432

  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Persistent storage configuration
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # Use default storage class if empty

# Keycloak configuration
keycloak:
  # Number of Keycloak instances
  instances: 1

  # HTTP configuration (enable for development)
  http:
    enabled: true
    port: 8080
    httpsPort: 8443

  # Proxy/Ingress configuration for OpenShift
  proxy:
    # Use xforwarded for OpenShift routes
    headers: xforwarded

  # Disable built-in ingress (we'll use OpenShift Route)
  ingress:
    enabled: false

  # Resource limits for Keycloak pods
  resources:
    requests:
      cpu: 500m
      memory: 1700Mi
    limits:
      cpu: 2000m
      memory: 2Gi

# Realm configuration
realm:
  # Create a peoplemesh realm
  enabled: true
  name: peoplemesh
  displayName: Peoplemesh
  description: Peoplemesh OIDC authentication realm

  # OIDC Client configuration (for peoplemesh application)
  client:
    enabled: true
    clientId: peoplemesh
    # Client secret - if empty, will be auto-generated
    # This secret is shared with the peoplemesh application
    clientSecret: ""  # Auto-generated if empty
    name: "Peoplemesh Application"
    description: "Peoplemesh OIDC client"
    # Redirect URIs - auto-configured based on peoplemesh route
    # Will use: https://peoplemesh-<namespace>.apps.<cluster-domain>/api/v1/auth/callback/keycloak
    redirectUris:
      - "https://peoplemesh-*.apps.*/api/v1/auth/callback/keycloak"
      - "http://localhost:8080/api/v1/auth/callback/keycloak"  # For local development
    webOrigins:
      - "https://peoplemesh-*.apps.*"
      - "http://localhost:8080"  # For local development

  # Test user configuration (optional, for quickstart demos)
  testUser:
    enabled: true
    username: testuser
    email: testuser@example.com
    firstName: Test
    lastName: User
    password: ""  # REQUIRED - no default value
    emailVerified: true
