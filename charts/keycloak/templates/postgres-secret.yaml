apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.applicationName }}-db-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: database
  annotations:
    # Create secret before other resources to ensure consistent password
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
type: Opaque
stringData:
  username: {{ .Values.postgres.user | quote }}
  password: {{ include "keycloak.postgresPassword" . | quote }}
