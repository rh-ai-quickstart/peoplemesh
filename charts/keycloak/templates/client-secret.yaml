{{- if .Values.realm.client.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-client-secret
  namespace: {{ include "keycloak.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.applicationName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: keycloak-oidc
  annotations:
    # Pre-install hook ensures this secret exists before other charts try to look it up
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
type: Opaque
stringData:
  clientSecret: {{ include "keycloak.clientSecret" . | quote }}
  issuerUrl: {{ include "keycloak.issuerUrl" . | quote }}
{{- end }}
